site_name: StringBuilder
site_url: https://ghoste0001.github.io/StringBuilder-Roblox/
repo_url: https://github.com/ghoste0001/StringBuilder-Roblox

theme:
  name: material
  palette:
    scheme: slate # Dark mode by default
    primary: deep orange
  features:
    - navigation.tabs
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python # Placeholder for docstring parsing

nav:
  - Home: index.md
  - API Reference: api.md
  - Usage Guide: usage.md